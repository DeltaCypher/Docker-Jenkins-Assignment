version: '3.8'

# ─────────────────────────────────────────────
#  NETWORKS
#  All containers talk to each other on this
#  internal bridge network called "app-network"
# ─────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─────────────────────────────────────────────
#  VOLUMES
#  Named volumes so data survives container
#  restarts (especially MySQL data)
# ─────────────────────────────────────────────
volumes:
  mysql-data:
  nginx-logs:

# ─────────────────────────────────────────────
#  SERVICES
# ─────────────────────────────────────────────
services:

  # ── 1. NGINX (Web Server) ──────────────────
  nginx:
    image: nginx:1.25          # exact version pinned
    container_name: nginx_server
    ports:
      - "80:80"                # http  → host:80  → container:80
      - "443:443"              # https (optional, for future SSL)
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro   # our custom config
      - ./app:/var/www/html:ro                                         # PHP source code
      - nginx-logs:/var/log/nginx                                      # logs volume (used by IP-extraction script)
    depends_on:
      - php-fpm                # nginx starts only after php-fpm is up
    networks:
      - app-network
    restart: unless-stopped

  # ── 2. PHP-FPM (PHP Processor) ────────────
  php-fpm:
    image: php:7.3-fpm         # exact version pinned
    container_name: php_fpm
    volumes:
      - ./app:/var/www/html    # same source-code folder as nginx
    networks:
      - app-network
    restart: unless-stopped

  # ── 3. MySQL (Database) ───────────────────
  mysql:
    image: mysql:8.0           # exact version pinned
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword   # ← change in production!
      MYSQL_DATABASE: myapp_db
      MYSQL_USER: myapp_user
      MYSQL_PASSWORD: myapp_pass          # ← change in production!
    ports:
      - "3306:3306"            # expose so backup script can connect from host
    volumes:
      - mysql-data:/var/lib/mysql         # persistent data storage
    networks:
      - app-network
    restart: unless-stopped
    # tells MySQL 8 to use the legacy auth plugin so phpMyAdmin can connect
    command: --default-authentication-plugin=mysql_native_password

  # ── 4. phpMyAdmin (DB GUI) ────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_ui
    environment:
      PMA_HOST: mysql          # container name of the MySQL service
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword   # must match mysql service above
    ports:
      - "8080:80"              # access phpMyAdmin at http://<VM-IP>:8080
    depends_on:
      - mysql
    networks:
      - app-network
    restart: unless-stopped
