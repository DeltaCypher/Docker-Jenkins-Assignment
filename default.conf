server {
    listen 80;
    server_name localhost;

    # Document root – must match the volume mount in docker-compose
    root /var/www/html;
    index index.php index.html;

    # ── Access & error logs ──────────────────────────────────────
    # These paths match the nginx-logs volume so the host script
    # can read them for IP extraction.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Static files ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── PHP files → forwarded to php-fpm container ───────────────
    location ~ \.php$ {
        fastcgi_pass   php-fpm:9000;          # service name from docker-compose
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ── Deny access to hidden files (.htaccess etc.) ─────────────
    location ~ /\. {
        deny all;
    }
}
